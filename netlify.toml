# S.O.S. — Netlify Deployment Configuration

[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# Redirect /api/claude/* → Netlify function (keeps AI key server-side in production)
[[redirects]]
  from   = "/api/claude/*"
  to     = "/.netlify/functions/claude"
  status = 200

# SPA-style fallback for any unmatched route
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 404
